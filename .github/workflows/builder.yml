name: Custom Rom Builder Samsung Galaxy A03
permissions:
  contents: write
on:
  workflow_dispatch:
    inputs:
      GSI:
        description: 'GSI Image Direct Link'
        required: true
        default: 'https://downloads.sourceforge.net/project/project-elixir/fourteen/gsi/ProjectElixir_4.2_arm64_bgN-14.0-20240427-2318-OFFICIAL.img.xz'
      NAME:
        description: 'Final File Name'
        required: true
        default: 'Project-Elixir-A03-Sparse.7z'
      VENDOR:
        description: 'Direct Link Of Your Vendor'
        required: true
        default: 'https://drive.usercontent.google.com/download?id=19ogdjRTvcUifAPSjm15gb-otf1pIH5LC&export=download&confirm=t'
      PRODUCT:
        description: 'Direct Link Of Your Product'
        required: true
        default: 'https://drive.usercontent.google.com/download?id=13uZN1bf_MmqLveO5eeZjgbSV0PXNr-aX&export=download&confirm=t'

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v2

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y zip xz-utils unzip p7zip-full wget android-sdk-libsparse-utils

    - name: Installing Tools
      run: |
        git clone https://github.com/Exynos-nigg/lpunpack-lpmake-mirror.git lpbinary
        cd lpbinary && bash install.sh

    - name: Downloading and Preparing Partitions
      run: |
        cd lpbinary/binary
        
        # SOURCEFORGE BYPASS: Uses a fake browser identity and retries
        wget --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/110.0.0.0 Safari/537.36" \
             --retry-connrefused --waitretry=1 --read-timeout=20 --timeout=15 -t 10 \
             "${{ github.event.inputs.GSI }}" -O gsi.img.xz
        
        xz -d gsi.img.xz
        mv *.img system_raw.img
        img2simg system_raw.img system.img
        
        # GOOGLE DRIVE DOWNLOADS
        wget -U "Mozilla/5.0" --no-check-certificate "${{ github.event.inputs.VENDOR }}" -O vendor_raw.img
        wget -U "Mozilla/5.0" --no-check-certificate "${{ github.event.inputs.PRODUCT }}" -O product_raw.img
        
        img2simg vendor_raw.img vendor.img
        img2simg product_raw.img product.img
        
        truncate -s 1M ext_raw.img
        img2simg ext_raw.img system_ext.img
        rm *_raw.img

    - name: Packing Super Image
      run: |
        cd lpbinary/binary
        SYS_SIZE=$(stat -c%s system.img)
        VND_SIZE=$(stat -c%s vendor.img)
        PRD_SIZE=$(stat -c%s product.img)
        EXT_SIZE=$(stat -c%s system_ext.img)
        
        # 30MB buffer for metadata headers (Extra safe for Binary 9)
        RAW_TOTAL=$((SYS_SIZE + VND_SIZE + PRD_SIZE + EXT_SIZE + 31457280))
        
        # BLOCK SIZE MATH: Rounds up to nearest 4096
        TOTAL_SIZE=$(( (RAW_TOTAL + 4095) / 4096 * 4096 ))
        
        ./lpmake --metadata-size 65536 --super-name super --metadata-slots 2 \
          --device super:$TOTAL_SIZE --group main:$TOTAL_SIZE \
          --partition system:readonly:$SYS_SIZE:main --image system=system.img \
          --partition vendor:readonly:$VND_SIZE:main --image vendor=vendor.img \
          --partition product:readonly:$PRD_SIZE:main --image product=product.img \
          --partition system_ext:readonly:$EXT_SIZE:main --image system_ext=system_ext.img \
          --sparse --output super.img

    - name: Creating Odin Flashable Tar
      run: |
        cd lpbinary/binary
        tar -cvf super.tar super.img
        rm super.img system.img vendor.img product.img system_ext.img
        7z a "${{ github.event.inputs.NAME }}" super.tar

    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: lpbinary/binary/${{ github.event.inputs.NAME }}
        name: ${{ github.event.inputs.NAME }}
        tag_name: ${{ github.run_id }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
